version: '3.8'

services:
  raven-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raven-backend-prod
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      # Monnify Credentials (should be configured in .env or system environment)
      - APIKEY=${APIKEY}
      - Secret_Key=${Secret_Key}
      - Contract_Code=${Contract_Code}
      - Monnify_Source_Account=${Monnify_Source_Account}
      # Africa's Talking Credentials
      - AT_API_KEY=${AT_API_KEY}
      - AT_USERNAME=${AT_USERNAME}
      - AT_VIRTUAL_NUMBER=${AT_VIRTUAL_NUMBER}
      - USER_PHONE_NUMBER=${USER_PHONE_NUMBER}
      - DRIVER_PHONE_NUMBER=${DRIVER_PHONE_NUMBER}
      # CORS configuration
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
    volumes:
      # Map host `./data` directory to preserve JSON DB persistence state
      - ./data:/usr/src/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); const req = http.request({ host: 'localhost', port: 5000, path: '/api/health', method: 'GET', timeout: 2000 }, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on('error', () => process.exit(1)); req.end();"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
